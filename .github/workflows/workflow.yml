name: Automated Code Review

# 1. Trigger: Tự động chạy khi có PR hướng vào nhánh main
on:
  pull_request:
    branches: [ "main" ]

jobs:
  checkstyle-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      # Chạy test để đảm bảo code không có lỗi logic
      - name: Run Unit Tests
        run: mvn clean test

      # 2. Inline Feedback: Sử dụng action để comment lỗi định dạng
      - name: Run Checkstyle Reviewdog
        uses: dbelyaev/action-checkstyle@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: error