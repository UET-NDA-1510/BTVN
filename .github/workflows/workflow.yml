name: Java CI with Maven

# Kích hoạt workflow khi có push hoặc pull request lên nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # Chạy trên môi trường Ubuntu mới nhất

    steps:
      # Bước 1: Clone mã nguồn từ repository về máy trạm (runner)
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Bước 2: Cài đặt môi trường Java (JDK)
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Bạn có thể đổi sang 11, 21 tùy phiên bản dự án
          distribution: 'temurin'
          cache: maven # Tối ưu hóa thời gian build bằng cách cache các dependencies

      # Bước 3: Thực thi vòng đời Maven
      - name: Build with Maven (Test and Package)
        run: mvn -B clean package

      # Bước 4: Upload file .jar sau khi build thành công
      - name: Upload JAR artifact
        # Đảm bảo step này chạy kể cả khi test fail (nếu bạn muốn lấy file debug),
        # nhưng ở đây ta mặc định chỉ upload nếu build thành công.
        uses: actions/upload-artifact@v4
        with:
          name: BTVN_WEEK9-artifact
          path: target/*.jar
          retention-days: 7 # Lưu trữ artifact trong 7 ngày